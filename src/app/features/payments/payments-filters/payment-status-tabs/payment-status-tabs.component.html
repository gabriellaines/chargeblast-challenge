<div class="status-tabs">
  <button
    type="button"
    class="status-tabs__tab"
    [class.status-tabs__tab--active]="statuses().length === 0"
    (click)="selectAll()"
  >
    <span class="status-tabs__label">All</span>
    <span class="status-tabs__count">{{ counts().count }}</span>
  </button>

  @for (tab of tabs; track tab.value) {
    <button
      type="button"
      class="status-tabs__tab"
      [class.status-tabs__tab--active]="isActive(tab.value)"
      (click)="toggle(tab.value)"
    >
      <span class="status-tabs__label">{{ tab.label }}</span>
      <span class="status-tabs__count">{{ countFor(tab.value) }}</span>
    </button>
  }
</div>
