<div class="filter-chip">
  <button type="button" class="filter-chip__button" (click)="toggle()">
    <svg class="icon-sm" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M8.75 4.25a.75.75 0 0 0-1.5 0v3h-3a.75.75 0 0 0 0 1.5h3v3a.75.75 0 0 0 1.5 0v-3h3a.75.75 0 0 0 0-1.5h-3v-3Z" fill="currentColor" />
      <path fill-rule="evenodd" clip-rule="evenodd" d="M16 8a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-1.5 0A6.5 6.5 0 1 1 1.5 8a6.5 6.5 0 0 1 13 0Z" fill="currentColor" />
    </svg>
    {{ label() }}
  </button>

  @if (hasMenu() && open()) {
    <div class="filter-chip__menu">
      <ng-content></ng-content>
    </div>
  }
</div>
