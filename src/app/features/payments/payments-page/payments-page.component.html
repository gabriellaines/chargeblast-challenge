<section class="payments-page">
  <app-payments-toolbar [totalItems]="facade.totalItems()" />

  @if (!bannerDismissed()) {
    <div class="payments-page__banner">
      <span class="payments-page__banner-badge">New</span>
      <span class="payments-page__banner-text">
        Rule Attributes are now in Sigma and Data Pipeline for better fraud insights.
      </span>
      <a class="payments-page__banner-link" href="javascript:void(0)">Get started</a>
      <button
        type="button"
        class="payments-page__banner-dismiss"
        aria-label="Dismiss announcement"
        (click)="dismissBanner()"
      >
        ✕
      </button>
    </div>
  }

  <app-payments-filters
    [filters]="facade.filters()"
    [statusCounts]="facade.statusCounts()"
    (filtersChange)="facade.updateFilters($event)"
    (exportRequested)="exportCsv()"
  />

  @if (facade.error(); as error) {
    <p class="payments-page__error">{{ error }}</p>
  }

  <app-payments-table
    [payments]="facade.payments()"
    [sort]="facade.sort()"
    [loading]="facade.loading()"
    [currentPage]="facade.currentPage()"
    [totalPages]="facade.totalPages()"
    [totalItems]="facade.totalItems()"
    [pageSize]="facade.pageSize()"
    (sortChange)="facade.updateSort($event)"
    (pageChange)="facade.goToPage($event)"
    (pageSizeChange)="facade.changePageSize($event)"
  />
</section>
