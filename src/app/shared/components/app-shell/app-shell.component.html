<div class="shell">
  <aside class="shell__sidebar">
    <button type="button" class="shell__workspace">
      <span class="shell__workspace-mark">C</span>
      <span class="shell__workspace-name">cramly.ai</span>
      <svg class="shell__chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>

    <nav class="shell__nav">
      <a routerLink="/payments" class="shell__nav-item">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 9.5 10 4l7 5.5M5 8.5V16h10V8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Home
      </a>
      <a class="shell__nav-item">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 16V8m5.5 8V4m5.5 12v-6M17 16V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Balances
      </a>
      <a routerLink="/payments" class="shell__nav-item shell__nav-item--active">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M2 7h13l-3-3m6 9H5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Transactions
      </a>
      <a class="shell__nav-item">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="6.5" r="3" stroke="currentColor" stroke-width="1.4" />
          <path d="M4 17c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        Customers
      </a>
      <a class="shell__nav-item">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 6.5 10 3l7 3.5-7 3.5-7-3.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
          <path d="M3 6.5V14l7 3.5 7-3.5V6.5" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
        </svg>
        Product catalog
      </a>
    </nav>

    <div class="shell__section">
      <span class="shell__section-label">Shortcuts</span>
      <a class="shell__nav-item shell__nav-item--sub">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 15V9m5 6V5m5 10v-4m5 4V8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        Payments analytics
      </a>
      <a class="shell__nav-item shell__nav-item--sub">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.4" />
          <path d="M10 6v4l3 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        Reports
      </a>
      <a class="shell__nav-item shell__nav-item--sub">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.4" />
          <path d="M10 6v4l3 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        Sigma
      </a>
      <a class="shell__nav-item shell__nav-item--sub">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.4" />
          <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.4" />
          <circle cx="10" cy="10" r="0.75" fill="currentColor" />
        </svg>
        Radar
      </a>
    </div>

    <div class="shell__section">
      <span class="shell__section-label">Products</span>
      <a class="shell__nav-item shell__nav-item--sub shell__nav-item--expandable">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M8 12 12 8m-5 6-1.5 1.5a3 3 0 1 1-4.2-4.2L4 10m8-8-1.5 1.5a3 3 0 1 0 4.2 4.2L16 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        Connect
        <svg class="shell__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <a class="shell__nav-item shell__nav-item--sub shell__nav-item--expandable">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <rect x="3" y="5" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4" />
          <path d="M3 8.5h14" stroke="currentColor" stroke-width="1.4" />
        </svg>
        Payments
        <svg class="shell__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <a class="shell__nav-item shell__nav-item--sub shell__nav-item--expandable">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M5 3h7l3 3v11H5V3Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
          <path d="M8 10h4M8 13h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        Billing
        <svg class="shell__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <a class="shell__nav-item shell__nav-item--sub shell__nav-item--expandable">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 16V9m5.5 7V4m5.5 12v-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        Reporting
        <svg class="shell__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <a class="shell__nav-item shell__nav-item--sub">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="5" cy="10" r="1.1" fill="currentColor" />
          <circle cx="10" cy="10" r="1.1" fill="currentColor" />
          <circle cx="15" cy="10" r="1.1" fill="currentColor" />
        </svg>
        More
      </a>
    </div>

    <div class="shell__sidebar-footer">
      <a class="shell__nav-item">
        <svg class="shell__nav-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M7 6 3 10l4 4M13 6l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Developers
      </a>
    </div>
  </aside>

  <div class="shell__body">
    <header class="shell__topbar">
      <label class="shell__search">
        <svg class="icon-search" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5" />
          <path d="m17 17-3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        <input type="search" placeholder="Search" />
      </label>

      <div class="shell__topbar-right">
        <span class="shell__test-mode">Test mode has moved. <a href="javascript:void(0)">Show me</a></span>

        <span class="shell__app-icon shell__app-icon--blue" aria-hidden="true">D</span>
        <span class="shell__app-icon shell__app-icon--dark" aria-hidden="true">◆</span>
        <span class="shell__app-icon shell__app-icon--green" aria-hidden="true">▲</span>

        <button type="button" class="shell__icon-button icon-button" aria-label="Apps">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="5" cy="5" r="1.4" fill="currentColor" /><circle cx="10" cy="5" r="1.4" fill="currentColor" /><circle cx="15" cy="5" r="1.4" fill="currentColor" />
            <circle cx="5" cy="10" r="1.4" fill="currentColor" /><circle cx="10" cy="10" r="1.4" fill="currentColor" /><circle cx="15" cy="10" r="1.4" fill="currentColor" />
            <circle cx="5" cy="15" r="1.4" fill="currentColor" /><circle cx="10" cy="15" r="1.4" fill="currentColor" /><circle cx="15" cy="15" r="1.4" fill="currentColor" />
          </svg>
        </button>

        <button type="button" class="shell__icon-button icon-button" aria-label="Help">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="7.25" stroke="currentColor" stroke-width="1.4" />
            <path d="M7.8 8a2.2 2.2 0 1 1 3.4 1.8c-.8.6-1.2 1-1.2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            <circle cx="10" cy="13.9" r="0.9" fill="currentColor" />
          </svg>
        </button>

        <button type="button" class="shell__icon-button icon-button" aria-label="Notifications">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M5 8a5 5 0 0 1 10 0c0 3.5 1.2 4.5 1.2 4.5H3.8S5 11.5 5 8Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
            <path d="M8.3 15.5a1.8 1.8 0 0 0 3.4 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          </svg>
          <span class="shell__notification-dot"></span>
        </button>

        <button type="button" class="shell__icon-button icon-button" aria-label="Settings">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="2.6" stroke="currentColor" stroke-width="1.4" />
            <path d="M10 3.5v1.8m0 9.4v1.8m6.5-6.5h-1.8M5.3 10H3.5m11.2-4.6-1.3 1.3M6.6 13.4l-1.3 1.3m9.4 0-1.3-1.3M6.6 6.6 5.3 5.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          </svg>
        </button>

        <button type="button" class="shell__avatar" aria-label="Create">+</button>
      </div>
    </header>

    <main class="shell__content">
      <ng-content></ng-content>
    </main>
  </div>
</div>
